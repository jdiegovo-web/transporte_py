<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Personal</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 50px; background-color: #f4f4f9; }
        form { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); max-width: 400px; }
        input { display: block; width: 100%; margin-bottom: 15px; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; font-weight: bold; }
        button:hover { background-color: #218838; }
        .mensaje { color: green; margin-bottom: 15px; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Registro de Personal - Transporte</h2>
    
    {% if mensaje %}
        <p class="mensaje">{{ mensaje }}</p>
    {% endif %}

    <form action="/registrar" method="post">
        <label>Primer Nombre:</label>
        <input type="text" name="primer_nombre" required>

        <label>Segundo Nombre:</label>
        <input type="text" name="segundo_nombre">

        <label>Primer Apellido:</label>
        <input type="text" name="primer_apellido" required>

        <label>Segundo Apellido:</label>
        <input type="text" name="segundo_apellido">

        <label>DNI / Documento Actual (Obligatorio):</label>
        <input type="text" name="dni_actual" required>

        <button type="submit">Guardar en PostgreSQL</button>
    </form>
</body>
</html>
